<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waspada Predator Pulpen</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }
        .meme-card {
            background: #2d2d2d;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #ff0000;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        h1 {
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-style: italic;
            color: #ccc;
        }
        .warning-btn {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .warning-btn:hover {
            background-color: #cc0000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="meme-card">
            <h1>BREAKING NEWS</h1>
            <img src="4ECF6EBF-971B-460F-8C9C-CFF7D2F9C650.jpeg" alt="Predator Pulpen">
            <p>Peringatan: Amankan alat tulis Anda sebelum terlambat.</p>
            <a href="#" class="warning-btn">LAPORKAN KEHILANGAN PULPEN</a>
        </div>
    </div>

</body>
</html>
